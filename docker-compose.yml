services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: jenkins-jcasc:local
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Dcasc.jenkins.config=/var/jenkins_conf/casc/jenkins.yaml
      CASC_JENKINS_CONFIG: /var/jenkins_conf/casc/jenkins.yaml
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./casc:/var/jenkins_conf/casc:ro
      - ./jobs:/var/jenkins_conf/jobs:ro
      # Docker-outside-of-Docker: Pipelines können den Daemon des Hosts nutzen.
      - /var/run/docker.sock:/var/run/docker.sock
    # Der jenkins-User braucht eine GID, die Schreibrechte auf /var/run/docker.sock hat.
    # DOCKER_GID kommt aus .env — Default 0 (root). Auf macOS/Docker Desktop ist die
    # GID des Sockets meist 0 (root). Auf Linux: `stat -c '%g' /var/run/docker.sock`.
    group_add:
      - "${DOCKER_GID:-0}"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  jenkins_home:
